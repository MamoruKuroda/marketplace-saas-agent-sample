name: Dependabot auto-merge

# Enable auto-merge (squash) on Dependabot pull requests.
# Only Dependabot *security updates* are enabled for this repo, so these PRs are
# targeted CVE patches. Auto-merge waits for the branch-protection required checks
# (build-test, build-test-sqlserver) to pass, so a PR only merges once CI is green.
# Uses `pull_request` (not `pull_request_target`) with an actor + repository guard.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-merge:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.repository == 'MamoruKuroda/marketplace-saas-agent-sample'
    steps:
      - name: Enable auto-merge (squash)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
