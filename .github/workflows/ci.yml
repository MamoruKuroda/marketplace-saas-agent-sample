name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Default lane: SQLite/InMemory only. SQL Server integration tests skip
  # themselves when SQL_SERVER_CONNECTION is not set.
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SaaSAgentSample.slnx

      - name: Build
        run: dotnet build SaaSAgentSample.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test SaaSAgentSample.slnx --configuration Release --no-build --verbosity normal

  # Authoritative SQL Server lane. Uses the same 2022 image the local
  # docker-compose.yml starts, so the migration is validated end-to-end.
  build-test-sqlserver:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: 'yourStrong(!)Password'
          MSSQL_PID: 'Developer'
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'yourStrong(!)Password' -No -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    env:
      SQL_SERVER_CONNECTION: 'Server=localhost,1433;Database=SaasAgentSample;User Id=sa;Password=yourStrong(!)Password;TrustServerCertificate=True;'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SaaSAgentSample.slnx

      - name: Build
        run: dotnet build SaaSAgentSample.slnx --configuration Release --no-restore

      - name: Wait for SQL Server readiness
        run: |
          for i in $(seq 1 30); do
            if docker exec ${{ job.services.sqlserver.id }} /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'yourStrong(!)Password' -No -Q 'SELECT 1' >/dev/null 2>&1; then
              echo "SQL Server ready"; exit 0
            fi
            echo "Waiting for SQL Server ($i)..."; sleep 3
          done
          echo "SQL Server did not become ready in time" >&2; exit 1

      - name: Test (SQL Server lane)
        run: dotnet test SaaSAgentSample.slnx --configuration Release --no-build --verbosity normal
